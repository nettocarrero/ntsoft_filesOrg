<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Organizador de Documentos{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="layout-with-sidebar">
    <aside class="sidebar">
        <div class="sidebar-brand">Organizador de Documentos</div>
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link{% if request.url.path == '/' %} active{% endif %}"><span class="nav-icon"><i data-lucide="layout-dashboard"></i></span>Dashboard</a>
            <a href="/review" class="sidebar-link{% if request.url.path.startswith('/review') %} active{% endif %}"><span class="nav-icon"><i data-lucide="clipboard-check"></i></span>Revisão manual</a>
            <a href="/files" class="sidebar-link{% if request.url.path.startswith('/files') %} active{% endif %}"><span class="nav-icon"><i data-lucide="folder"></i></span>Explorador</a>
            <a href="/payments" class="sidebar-link{% if request.url.path.startswith('/payments') %} active{% endif %}"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></span>Pagamentos</a>
            <a href="/upload" class="sidebar-link{% if request.url.path == '/upload' %} active{% endif %}"><span class="nav-icon"><i data-lucide="upload"></i></span>Enviar para classificação</a>
            <a href="/config" class="sidebar-link{% if request.url.path.startswith('/config') %} active{% endif %}"><span class="nav-icon"><i data-lucide="settings"></i></span>Configurações</a>
        </nav>
        <div class="sidebar-footer">Painel local — ntsoft-orgfiles</div>
    </aside>
    <main class="main">
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>
    <script src="/static/js/main.js"></script>
    <script>
        if (window.lucide && typeof lucide.createIcons === 'function') {
            lucide.createIcons();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
