<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Organizador de Documentos{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="layout-with-sidebar">
    <aside class="sidebar">
        <div class="sidebar-brand">Organizador de Documentos</div>
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link{% if request.url.path == '/' %} active{% endif %}">Dashboard</a>
            <a href="/review" class="sidebar-link{% if request.url.path.startswith('/review') %} active{% endif %}">Revisão manual</a>
            <a href="/files" class="sidebar-link{% if request.url.path.startswith('/files') %} active{% endif %}">Explorador</a>
            <a href="/upload" class="sidebar-link{% if request.url.path == '/upload' %} active{% endif %}">Enviar para classificação</a>
            <a href="/config" class="sidebar-link{% if request.url.path.startswith('/config') %} active{% endif %}">Configurações</a>
        </nav>
    </aside>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        Painel local — ntsoft-orgfiles
    </footer>
    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
